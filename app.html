<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Packers Trivia Game</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Open+Sans:wght@400;600&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #203731;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 20px 10px;
      width: 100%;
    }

    header h1 {
      font-family: 'Oswald', sans-serif;
      font-size: 2.8rem;
      color: #FFB612;
      letter-spacing: 4px;
      text-shadow: 2px 2px 8px rgba(0,0,0,0.5);
    }

    header p {
      color: #c8e6c9;
      margin-top: 8px;
      font-size: 1rem;
    }

    #back-link {
      display: inline-block;
      margin: 10px 0 20px;
      color: #FFB612;
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
    }
    #back-link:hover { text-decoration: underline; }

    #game-container {
      background: #1a2e25;
      border: 3px solid #FFB612;
      border-radius: 16px;
      padding: 36px 40px;
      max-width: 680px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    #score-bar {
      display: flex;
      justify-content: space-between;
      margin-bottom: 24px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.1rem;
    }

    #score-bar span { color: #FFB612; }

    #progress-track {
      width: 100%;
      background: #2d4a3a;
      border-radius: 10px;
      height: 10px;
      margin-bottom: 28px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: #FFB612;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    #question-number {
      font-family: 'Oswald', sans-serif;
      color: #FFB612;
      font-size: 0.9rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    #question-text {
      font-size: 1.25rem;
      color: #ffffff;
      font-weight: 600;
      line-height: 1.5;
      margin-bottom: 28px;
      min-height: 64px;
    }

    #options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 24px;
    }

    .option-btn {
      background: #2d4a3a;
      border: 2px solid #4a7a5a;
      color: #ffffff;
      border-radius: 10px;
      padding: 16px 12px;
      font-size: 0.97rem;
      font-family: 'Open Sans', sans-serif;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      line-height: 1.4;
    }

    .option-btn:hover:not(:disabled) {
      background: #3a5e4a;
      border-color: #FFB612;
      color: #FFB612;
      transform: translateY(-2px);
    }

    .option-btn.correct {
      background: #1b5e20;
      border-color: #4caf50;
      color: #ffffff;
      transform: none;
    }

    .option-btn.wrong {
      background: #7f0000;
      border-color: #f44336;
      color: #ffffff;
      transform: none;
    }

    .option-btn:disabled { cursor: not-allowed; opacity: 0.85; }

    #feedback-box {
      min-height: 48px;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 0.95rem;
      font-weight: 600;
      display: none;
      margin-bottom: 20px;
    }

    #feedback-box.correct {
      background: rgba(76,175,80,0.15);
      border: 1px solid #4caf50;
      color: #a5d6a7;
      display: block;
    }

    #feedback-box.wrong {
      background: rgba(244,67,54,0.15);
      border: 1px solid #f44336;
      color: #ef9a9a;
      display: block;
    }

    #next-btn {
      width: 100%;
      background: #FFB612;
      color: #203731;
      border: none;
      border-radius: 10px;
      padding: 14px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      display: none;
      transition: background 0.2s, transform 0.1s;
    }

    #next-btn:hover { background: #ffc93c; transform: translateY(-2px); }

    /* Results screen */
    #results-screen {
      text-align: center;
      display: none;
    }

    #results-screen .trophy { font-size: 5rem; margin-bottom: 16px; }

    #results-screen h2 {
      font-family: 'Oswald', sans-serif;
      font-size: 2rem;
      color: #FFB612;
      margin-bottom: 10px;
    }

    #results-screen .final-score {
      font-size: 3.5rem;
      font-family: 'Oswald', sans-serif;
      color: #ffffff;
      margin: 16px 0;
    }

    #results-screen .grade-label {
      color: #c8e6c9;
      font-size: 1.1rem;
      margin-bottom: 28px;
    }

    #restart-btn {
      background: #FFB612;
      color: #203731;
      border: none;
      border-radius: 10px;
      padding: 14px 40px;
      font-family: 'Oswald', sans-serif;
      font-size: 1.2rem;
      letter-spacing: 2px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #restart-btn:hover { background: #ffc93c; }

    footer {
      margin-top: 30px;
      color: #4a7a5a;
      font-size: 0.8rem;
    }

    @media (max-width: 500px) {
      #options-grid { grid-template-columns: 1fr; }
      #game-container { padding: 24px 20px; }
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🧀 PACKERS TRIVIA</h1>
  <p>How well do you know the Green Bay Packers?</p>
</header>

<a href="scratch.html" id="back-link">← Back to Packers Page</a>

<div id="game-container">

  <!-- GAME SCREEN -->
  <div id="game-screen">
    <div id="score-bar">
      <div>Score: <span id="score-display">0</span></div>
      <div>Question <span id="q-counter">1</span> of 10</div>
    </div>

    <div id="progress-track">
      <div id="progress-fill" style="width:10%"></div>
    </div>

    <div id="question-number">QUESTION 1</div>
    <div id="question-text">Loading...</div>

    <div id="options-grid">
      <button class="option-btn" id="opt0" onclick="selectAnswer(0)"></button>
      <button class="option-btn" id="opt1" onclick="selectAnswer(1)"></button>
      <button class="option-btn" id="opt2" onclick="selectAnswer(2)"></button>
      <button class="option-btn" id="opt3" onclick="selectAnswer(3)"></button>
    </div>

    <div id="feedback-box"></div>
    <button id="next-btn" onclick="nextQuestion()">NEXT QUESTION →</button>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results-screen">
    <div class="trophy" id="trophy-emoji">🏆</div>
    <h2 id="result-title">Quiz Complete!</h2>
    <div class="final-score" id="final-score-display">0/10</div>
    <div class="grade-label" id="grade-label"></div>
    <button id="restart-btn" onclick="restartGame()">PLAY AGAIN</button>
  </div>

</div>

<footer>Maxwell James Justus · BYU · Go Pack Go!</footer>

<script>
  const questions = [
    {
      q: "In what year were the Green Bay Packers founded?",
      options: ["1915", "1919", "1922", "1925"],
      answer: 1,
      fact: "The Packers were founded on August 11, 1919 by Curly Lambeau and George Calhoun."
    },
    {
      q: "Who was the legendary coach who led the Packers to the first two Super Bowl wins?",
      options: ["Mike Holmgren", "Curly Lambeau", "Vince Lombardi", "Mike McCarthy"],
      answer: 2,
      fact: "Vince Lombardi coached the Packers from 1959–1967 and the Super Bowl trophy is named after him!"
    },
    {
      q: "How many Super Bowls have the Green Bay Packers won?",
      options: ["3", "4", "5", "6"],
      answer: 1,
      fact: "The Packers have won 4 Super Bowls: I, II, XXXI, and XLV."
    },
    {
      q: "What is the name of the Packers' home stadium?",
      options: ["Arrowhead Stadium", "Soldier Field", "Lambeau Field", "US Bank Stadium"],
      answer: 2,
      fact: "Lambeau Field, named after founder Curly Lambeau, is one of the most iconic venues in sports."
    },
    {
      q: "Aaron Rodgers won how many NFL MVP awards as a Packer?",
      options: ["2", "3", "4", "5"],
      answer: 2,
      fact: "Rodgers won 4 NFL MVP awards (2011, 2014, 2020, 2021) — all while with Green Bay."
    },
    {
      q: "What infamous cold-weather game was played at Lambeau Field in 1967?",
      options: ["The Tundra Bowl", "The Ice Bowl", "The Frozen Classic", "The Snow Game"],
      answer: 1,
      fact: "The Ice Bowl was played on December 31, 1967 at -13°F. Bart Starr scored the winning TD with 13 seconds left."
    },
    {
      q: "The Packers are the only NFL team owned by whom?",
      options: ["The city of Green Bay", "A single billionaire", "The community (public shareholders)", "The state of Wisconsin"],
      answer: 2,
      fact: "The Packers are the only community-owned franchise in major American professional sports!"
    },
    {
      q: "Brett Favre won how many consecutive MVP awards from 1995–1997?",
      options: ["2", "3", "4", "1"],
      answer: 1,
      fact: "Favre won 3 consecutive NFL MVPs (1995, 1996, 1997) — a record that stood for decades."
    },
    {
      q: "What are the official team colors of the Green Bay Packers?",
      options: ["Blue and Gold", "Green and White", "Green and Gold", "Dark Green and Yellow"],
      answer: 2,
      fact: "Green and Gold! The specific shades are Dark Forest Green and Metallic Gold."
    },
    {
      q: "Who replaced Aaron Rodgers as the Packers' starting quarterback in 2023?",
      options: ["Malik Willis", "Sean Clifford", "Jordan Love", "Danny Etling"],
      answer: 2,
      fact: "Jordan Love took over as the starter in 2023 after Rodgers was traded to the New York Jets."
    }
  ];

  let currentQ = 0;
  let score = 0;
  let answered = false;

  function loadQuestion() {
    const q = questions[currentQ];
    answered = false;

    document.getElementById('question-number').textContent = `QUESTION ${currentQ + 1}`;
    document.getElementById('question-text').textContent = q.q;
    document.getElementById('q-counter').textContent = currentQ + 1;
    document.getElementById('progress-fill').style.width = `${((currentQ + 1) / questions.length) * 100}%`;

    const feedback = document.getElementById('feedback-box');
    feedback.className = '';
    feedback.style.display = 'none';
    document.getElementById('next-btn').style.display = 'none';

    for (let i = 0; i < 4; i++) {
      const btn = document.getElementById(`opt${i}`);
      btn.textContent = q.options[i];
      btn.className = 'option-btn';
      btn.disabled = false;
    }
  }

  function selectAnswer(index) {
    if (answered) return;
    answered = true;

    const q = questions[currentQ];
    const feedback = document.getElementById('feedback-box');

    for (let i = 0; i < 4; i++) {
      document.getElementById(`opt${i}`).disabled = true;
    }

    if (index === q.answer) {
      score++;
      document.getElementById(`opt${index}`).classList.add('correct');
      feedback.textContent = `✅ Correct! ${q.fact}`;
      feedback.className = 'correct';
      document.getElementById('score-display').textContent = score;
    } else {
      document.getElementById(`opt${index}`).classList.add('wrong');
      document.getElementById(`opt${q.answer}`).classList.add('correct');
      feedback.textContent = `❌ Not quite! ${q.fact}`;
      feedback.className = 'wrong';
    }

    const nextBtn = document.getElementById('next-btn');
    nextBtn.style.display = 'block';
    if (currentQ === questions.length - 1) {
      nextBtn.textContent = 'SEE RESULTS 🏆';
    } else {
      nextBtn.textContent = 'NEXT QUESTION →';
    }
  }

  function nextQuestion() {
    currentQ++;
    if (currentQ >= questions.length) {
      showResults();
    } else {
      loadQuestion();
    }
  }

  function showResults() {
    document.getElementById('game-screen').style.display = 'none';
    const results = document.getElementById('results-screen');
    results.style.display = 'block';

    const pct = score / questions.length;
    let trophy, title, grade;

    if (pct === 1) {
      trophy = '🏆'; title = 'Packers Legend!'; grade = 'Perfect score! Lombardi himself would be proud.';
    } else if (pct >= 0.8) {
      trophy = '🧀'; title = 'True Cheesehead!'; grade = 'Excellent! You really know your Packers.';
    } else if (pct >= 0.6) {
      trophy = '🏈'; title = 'Solid Packer Fan!'; grade = 'Good work! Brush up on your history.';
    } else if (pct >= 0.4) {
      trophy = '😬'; title = 'Room to Grow!'; grade = 'Not bad, but a real Packer fan can do better!';
    } else {
      trophy = '🤔'; title = 'Are You a Bears Fan?!'; grade = 'Time to study up on the greatest team in the NFL!';
    }

    document.getElementById('trophy-emoji').textContent = trophy;
    document.getElementById('result-title').textContent = title;
    document.getElementById('final-score-display').textContent = `${score}/10`;
    document.getElementById('grade-label').textContent = grade;
  }

  function restartGame() {
    currentQ = 0;
    score = 0;
    document.getElementById('score-display').textContent = 0;
    document.getElementById('results-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    loadQuestion();
  }

  // Start game
  loadQuestion();
</script>

</body>
</html>
